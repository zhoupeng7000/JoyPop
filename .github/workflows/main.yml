name: 🚀 Deploy JoyPop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Build Frontend
        run: |
          npm ci
          npm run build

      - name: 📂 Transfer files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/,server/,package.json,package-lock.json"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: 🚀 Start/Restart PM2 Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/JoyPop
            npm ci --omit=dev
            pm2 reload joypop-server --update-env || pm2 start server/server.js --name joypop-server --time
            pm2 save
            pm2 status joypop-server
