# 1. 工作流的名称
name: Deploy to Server

# 2. 触发条件：当代码被推送到 main 分支时触发
on:
  push:
    branches: [ main ]

# 3. 工作任务（jobs）
jobs:
  deploy:
    # 运行环境：使用 GitHub 提供的 Ubuntu 虚拟机
    runs-on: ubuntu-latest
    
    # 步骤（steps）
    steps:
      # 步骤1：拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 步骤3：安装项目依赖
      - name: Install dependencies
        run: npm install

      # 步骤4：构建项目（如果项目需要构建，如 React/Vue）
      - name: Build project
        run: npm run build

      # 步骤5：纯命令部署（需要你的服务器自己拉取，或者通过命令处理）
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}        # 服务器 IP
          username: ${{ secrets.SERVER_USER }}    # 服务器用户名
          key: ${{ secrets.SERVER_SSH_KEY }}      # 服务器的 SSH 私钥
          script: |
            cd /var/www/JoyPop
            # 因为这个插件不能直接帮你传 dist，你必须通过服务器自己去 git pull
            git fetch --all
            git reset --hard origin/main
            npm install
            npm run build
            pm2 restart JoyPop || pm2 start npm --name "JoyPop" -- run start
     
